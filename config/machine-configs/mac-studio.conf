# Mac Studio Configuration
# Hardware-specific settings for Mac Studio M1 Max 32GB
# Optimized for always-on operation, high performance, and server-like functionality

[hardware]
model=Mac Studio
chip_type=apple_silicon
chip_name=M1 Max
memory_gb=32
type=studio
performance_tier=high
always_on=true

[system]
# Power management - optimized for always-on operation
sleep_display=0                # Never sleep display
sleep_system=0                 # Never sleep system  
power_nap=0                    # Disable Power Nap
wake_on_network=1              # Enable wake on network access
auto_restart=1                 # Auto restart after power failure
hibernate_mode=0               # Disable hibernation

# Thermal management
thermal_pressure_handling=aggressive

[sharing]
# File sharing - enable all services for network server operation
enable_afp=true
enable_smb=true
enable_ssh=true
enable_remote_login=true
create_shared_folder=true
shared_folder_name=Studio-Server
shared_folder_path=/Users/Shared/Studio-Server

# Network services
enable_bonjour=true
enable_service_discovery=true
enable_time_machine_server=true

# Screen sharing for remote access
enable_screen_sharing=true
enable_remote_management=true

# Wake-on-LAN
enable_wake_on_lan=true
enable_network_wake=true

[network]
# Network optimization
hostname=mac-studio
bonjour_name=Mac-Studio
enable_bonjour=true
network_discovery=true

# DNS configuration
use_custom_dns=true
primary_dns=1.1.1.1
secondary_dns=1.0.0.1

[performance]
# CPU and memory optimization
background_app_refresh=limited
visual_effects=reduced
transparency=false
motion=reduced

# Storage optimization
spotlight_indexing=selective
time_machine_local_snapshots=false

[development]
# Development environment settings
install_xcode=true
install_docker=true
install_homebrew_services=true
enable_virtualization=true

# Container optimization
docker_memory_limit=16g
docker_cpu_limit=8

[security]
# Security settings for always-on operation
firewall_enabled=true
stealth_mode=true
file_vault=true
secure_boot=full

# SSH hardening
ssh_key_type=ed25519
ssh_disable_password_auth=false  # Keep password as backup
ssh_max_auth_tries=3

[backup]
# Time Machine and backup settings
time_machine_enabled=true
time_machine_frequency=hourly
exclude_large_files=true

[applications]
# Applications suitable for Studio setup
productivity_suite=full
development_tools=full
server_tools=true
media_tools=basic

[maintenance]
# Automated maintenance
auto_update_homebrew=true
auto_cleanup_logs=true
auto_restart_schedule=never  # Always-on machine
disk_cleanup_frequency=weekly