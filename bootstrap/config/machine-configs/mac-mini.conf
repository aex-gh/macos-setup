# Mac Mini Configuration
# Hardware-specific settings for Mac Mini M4 16GB  
# Optimized for compact desktop use, moderate performance, and efficient operation

[hardware]
model=Mac Mini
chip_type=apple_silicon
chip_name=M4
memory_gb=16
type=mini
performance_tier=medium
compact=true
headless_capable=true

[system]
# Power management - balanced for compact desktop
sleep_display=20               # Display sleep after 20 minutes
sleep_system=0                 # Never sleep system (desktop behavior)
power_nap=1                    # Enable Power Nap
wake_on_network=1              # Enable wake on network access
auto_restart=1                 # Auto restart after power failure
hibernate_mode=0               # Disable hibernation (desktop)

# Thermal management for compact form factor
thermal_pressure_handling=balanced
fan_control=auto

[sharing]
# File sharing - moderate level for home network use
enable_afp=true
enable_smb=true
enable_ssh=true
enable_remote_login=true
create_shared_folder=true
shared_folder_name=Mini-Shared

# Screen sharing for remote access
enable_screen_sharing=true
enable_remote_management=false

# Network share mounting (access to Mac Studio server)
auto_mount_studio_server=true
studio_server_address=mac-studio.local
mount_point=/Volumes/Studio-Server
mount_protocol=afp
backup_mount_protocol=smb

[network]
# Network settings for home network hub
hostname=mac-mini
bonjour_name=Mac-Mini
enable_bonjour=true
network_discovery=true

# DNS configuration
use_custom_dns=true
primary_dns=1.1.1.1
secondary_dns=1.0.0.1

# Network optimization
ethernet_preferred=true

[performance]
# Performance optimized for 16GB memory
background_app_refresh=intelligent
visual_effects=standard
transparency=true
motion=standard

# Memory management for 16GB system
memory_pressure_handling=aggressive
swap_usage=optimized

# Storage optimization
spotlight_indexing=full
time_machine_local_snapshots=true

[development]
# Development environment for medium-tier system
install_xcode=true
install_docker=true
install_homebrew_services=true
enable_virtualization=true

# Container optimization for 16GB
docker_memory_limit=8g
docker_cpu_limit=6

[security]
# Security for home network device
firewall_enabled=true
stealth_mode=true
file_vault=true
secure_boot=full

# SSH configuration
ssh_key_type=ed25519
ssh_disable_password_auth=false
ssh_max_auth_tries=3

[backup]
# Time Machine for regular desktop use
time_machine_enabled=true
time_machine_frequency=daily
exclude_large_files=false

[applications]
# Applications for home productivity and light development
productivity_suite=full
development_tools=standard
server_tools=basic
media_tools=full
design_tools=false

[maintenance]
# Regular maintenance for home desktop
auto_update_homebrew=true
auto_cleanup_logs=true
auto_restart_schedule=weekly
disk_cleanup_frequency=weekly

[media]
# Media server capabilities
enable_media_sharing=true
photo_library_optimization=true
music_library_optimization=true

[energy]
# Energy efficiency for compact desktop
energy_saver_mode=balanced
processor_performance=automatic
graphics_switching=automatic