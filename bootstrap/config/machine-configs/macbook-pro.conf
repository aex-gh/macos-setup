# MacBook Pro Configuration  
# Hardware-specific settings for MacBook Pro M1 Pro 32GB
# Optimized for mobile productivity, battery life, and development work

[hardware]
model=MacBook Pro
chip_type=apple_silicon
chip_name=M1 Pro
memory_gb=32
type=laptop
performance_tier=high
portable=true
has_touch_id=true
has_battery=true

[system]
# Power management - balanced mobile configuration
sleep_display_battery=5        # Display sleep on battery (5 minutes)
sleep_display_power=30         # Display sleep on AC power (30 minutes)
sleep_system_battery=15        # System sleep on battery (15 minutes)
sleep_system_power=0           # Never sleep on AC power (always-on when plugged in)
sleep_disk_battery=10          # Disk sleep on battery (10 minutes)
sleep_disk_power=0             # Never sleep disks on AC power
power_nap_battery=0            # Disable Power Nap on battery
power_nap_power=1              # Enable Power Nap on AC power
wake_on_network_battery=0      # Disable wake on network (battery saving)
wake_on_network_power=1        # Enable wake on network on AC power
auto_restart=0                 # Disable auto restart (mobile stability)
hibernate_mode=3               # Balanced hibernation mode for laptops
lid_wake=1                     # Wake when lid opened
standby_mode=1                 # Enable standby mode for mobile
standby_delay=86400            # 24 hour standby delay
tcp_keep_alive=1               # Enable TCP keep alive for network connections

# Battery optimization
optimized_battery_charging=true
low_power_mode_threshold=20

# Apple Silicon Wake Limitations
# Note: Traditional Wake-on-LAN is not supported on Apple Silicon
# Mobile configuration uses balanced power management
enable_wake_on_lan=false       # Not supported on Apple Silicon
enable_network_wake=true       # Limited Apple Silicon support (Wi-Fi only, AC power)
wake_on_magic_packet=false     # Not supported on Apple Silicon

[sharing]
# File sharing - client configuration for daily driver
enable_afp=false
enable_smb=false
enable_ssh=true
enable_remote_login=true
create_shared_folder=false

# Screen sharing - available but not always on
enable_screen_sharing=false
enable_remote_management=false

# Network share mounting
auto_mount_studio_server=true
studio_server_address=mac-studio.local
mount_point=/Volumes/Studio-Server
mount_protocol=afp
backup_mount_protocol=smb

[network]
# Network settings for mobile use
hostname=macbook-pro
bonjour_name=MacBook-Pro
enable_bonjour=true
network_discovery=true

# WiFi optimization
wifi_power_save=true
auto_join_hotspots=false

# DNS configuration
use_custom_dns=true
primary_dns=1.1.1.1
secondary_dns=1.0.0.1

[performance]
# Performance balanced with battery life
background_app_refresh=intelligent
visual_effects=standard
transparency=true
motion=standard

# Storage optimization
spotlight_indexing=full
time_machine_local_snapshots=true

[development]
# Mobile development environment
install_xcode=true
install_docker=true
install_homebrew_services=false  # Don't auto-start services
enable_virtualization=true

# Container optimization for mobile
docker_memory_limit=8g
docker_cpu_limit=4

[security]
# Enhanced security for mobile device
firewall_enabled=true
stealth_mode=true
file_vault=true
secure_boot=full

# Touch ID configuration
touch_id_sudo=true
touch_id_unlock=true
touch_id_apple_pay=true

# SSH security
ssh_key_type=ed25519
ssh_disable_password_auth=false
ssh_max_auth_tries=3

[backup]
# Time Machine optimized for mobile
time_machine_enabled=true
time_machine_frequency=daily
time_machine_battery_backup=false  # Don't backup on battery
exclude_large_files=true

[applications]
# Applications for mobile productivity
productivity_suite=full
development_tools=full
server_tools=false
media_tools=full
design_tools=basic

[maintenance]
# Mobile-optimized maintenance
auto_update_homebrew=false     # Manual updates to control timing
auto_cleanup_logs=true
auto_restart_schedule=weekly   # Weekly restart recommended
disk_cleanup_frequency=weekly

[connectivity]
# Mobile connectivity features
bluetooth_always_on=true
handoff_enabled=true
universal_clipboard=true
airdrop_enabled=true
continuity_camera=true

[privacy]
# Privacy settings for mobile device
location_services=selective
siri_enabled=true
analytics_sharing=false
ad_tracking=false