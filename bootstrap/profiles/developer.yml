# Developer Profile Configuration
# Comprehensive setup for software development across multiple languages and platforms

name: "Software Developer"
description: "Full development environment with multiple languages, tools, and IDEs"
version: "1.0.0"

# Modules to execute for this profile
modules:
  required:
    - "01-system-detection"
    - "02-xcode-tools" 
    - "03-homebrew-setup"
    - "04-system-setup"
    - "05-macos-defaults"
  optional:
    - "06-applications"
    - "07-security-hardening"
    - "08-development-env"
    - "09-post-setup"

# Homebrew configuration
homebrew:
  brewfiles:
    - "Brewfile"                    # Base essentials
    - "Brewfile.development"        # Development tools
  
  additional_taps:
    - "hashicorp/tap"
    - "azure/functions"
  
  services_to_start:
    - "postgresql@15"
    - "redis"
    - "docker"

# Application categories to install
applications:
  editors:
    - "visual-studio-code"
    - "zed"
    - "jetbrains-toolbox"
  
  terminals:
    - "iterm2"
    - "warp"
    - "ghostty"
  
  version_control:
    - "github-desktop"
    - "sourcetree"
  
  api_tools:
    - "postman"
    - "proxyman"
  
  containers:
    - "docker"
    - "orbstack"
  
  databases:
    - "tableplus"
    - "sequel-pro"

# Programming languages and runtimes
languages:
  python:
    versions: ["3.11", "3.12"]
    package_manager: "uv"
    global_packages:
      - "black"
      - "flake8"
      - "mypy"
      - "pytest"
  
  node:
    package_manager: "npm"
    global_packages:
      - "typescript"
      - "eslint"
      - "prettier"
      - "@vue/cli"
      - "create-react-app"
      - "@anthropic-ai/claude-code"
  
  go:
    enable: true
    tools:
      - "gofmt"
      - "golint"
  
  rust:
    enable: true
    tools:
      - "cargo"
      - "rustfmt"
  
  java:
    enable: true
    version: "openjdk"

# Development environment configuration
development:
  git:
    default_branch: "main"
    pull_rebase: true
    merge_ff_only: false
  
  shell:
    default: "zsh"
    plugins:
      - "git"
      - "docker"
      - "kubectl"
      - "terraform"
  
  vscode_extensions:
    - "ms-python.python"
    - "ms-vscode.vscode-typescript-next"
    - "rust-lang.rust-analyzer"
    - "golang.go"
    - "ms-vscode.vscode-docker"
    - "hashicorp.terraform"

# Cloud platform tools
cloud:
  aws:
    install_cli: true
    install_cdk: true
  
  azure:
    install_cli: true
    install_functions: true
  
  gcp:
    install_cli: true

# System optimizations
system:
  macos_defaults:
    dock_size: 36
    dock_autohide: true
    finder_show_extensions: true
    faster_key_repeat: true
  
  performance:
    disable_animations: false
    optimize_for_development: true

# Security settings
security:
  firewall: true
  filevault: true
  ssh_keys: true
  touch_id_sudo: true  # If available

# Backup and sync
backup:
  time_machine: true
  dotfiles_repo: "git@github.com:aex-gh/dotfiles.git"
  sync_settings: true

# Hardware-specific optimizations
hardware_optimizations:
  apple_silicon:
    use_native_apps: true
    rosetta2: false  # Avoid unless necessary
  
  memory_management:
    high_memory: "enable_dev_containers"
    low_memory: "limit_background_processes"
  
  storage:
    ssd_optimization: true
    trim_enable: true

# Optional features (user will be prompted)
optional_features:
  - name: "Docker Desktop"
    description: "Container development platform"
    default: true
  
  - name: "JetBrains Toolbox"
    description: "Professional IDE suite"
    default: false
  
  - name: "Database Services"
    description: "Local PostgreSQL and Redis"
    default: true
  
  - name: "Cloud CLIs"
    description: "AWS, Azure, and GCP command line tools"
    default: true

# Post-installation tasks
post_install:
  - "Configure SSH keys"
  - "Set up Git identity"
  - "Install VS Code extensions"
  - "Configure shell aliases"
  - "Set up development directories"

# Verification checks
verification:
  commands:
    - "git --version"
    - "node --version"
    - "python3 --version"
    - "docker --version"
    - "brew --version"
    - "claude --version"
  
  services:
    - "postgresql@15"
    - "redis"
  
  directories:
    - "~/Development"
    - "~/Projects"
    - "~/.config"