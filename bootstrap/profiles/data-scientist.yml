# Data Scientist Profile Configuration
# Comprehensive machine learning and data science environment

name: "Data Scientist"
description: "ML/DS environment with Python, R, Julia, and big data tools"
version: "1.0.0"

# Modules to execute for this profile
modules:
  required:
    - "01-system-detection"
    - "02-xcode-tools"
    - "03-homebrew-setup"
    - "04-system-setup"
    - "05-macos-defaults"
    - "07-security-hardening"  # Extra security for data work
  optional:
    - "06-applications"
    - "08-development-env"
    - "09-post-setup"

# Homebrew configuration
homebrew:
  brewfiles:
    - "Brewfile"                    # Base essentials
    - "Brewfile.data-science"       # ML/DS specific tools
  
  additional_taps:
    - "r-lib/rig"
    - "mongodb/brew"
  
  services_to_start:
    - "postgresql@15"
    - "redis"
    - "mongodb-community"
    - "elasticsearch"

# Application categories
applications:
  data_science_ides:
    - "visual-studio-code"
    - "rstudio"
    - "zed"
  
  data_tools:
    - "tableau-public"
    - "anaconda"
  
  database_tools:
    - "tableplus"
    - "mongodb-compass"
    - "pgadmin4"
  
  reference_management:
    - "zotero"
    - "papers"
  
  productivity:
    - "jupyter-notebook-viewer"

# Programming languages for data science
languages:
  python:
    versions: ["3.11", "3.12"]
    package_manager: "uv"
    data_science_packages:
      - "jupyter"
      - "jupyterlab"
      - "numpy"
      - "pandas"
      - "scikit-learn"
      - "matplotlib"
      - "seaborn"
      - "plotly"
      - "statsmodels"
      - "scipy"
      - "tensorflow"
      - "torch"
      - "transformers"
      - "xgboost"
      - "lightgbm"
      - "catboost"
      - "mlflow"
      - "wandb"
      - "dvc"
  
  r:
    enable: true
    packages:
      - "tidyverse"
      - "ggplot2"
      - "dplyr"
      - "shiny"
      - "rmarkdown"
      - "caret"
      - "randomForest"
  
  julia:
    enable: true
    packages:
      - "DataFrames"
      - "Plots"
      - "MLJ"
  
  scala:
    enable: true  # For Spark
    spark_integration: true
  
  node:
    package_manager: "npm"
    global_packages:
      - "@anthropic-ai/claude-code"  # AI-powered coding assistant
      - "typescript"
      - "prettier"

# Data science environment
data_science:
  jupyter:
    lab_extensions:
      - "@jupyterlab/toc"
      - "@jupyter-widgets/jupyterlab-manager"
      - "jupyterlab-git"
      - "jupyterlab-lsp"
    
    kernels:
      - "python3"
      - "ir"  # R kernel
      - "julia"
  
  databases:
    postgresql:
      create_ds_database: true
      install_extensions:
        - "pg_stat_statements"
        - "postgis"  # For geospatial data
    
    mongodb:
      create_sample_collections: true
    
    redis:
      configure_for_caching: true

# Machine learning platforms
ml_platforms:
  local:
    mlflow_tracking: true
    tensorboard: true
    weights_biases: false  # Optional, requires account
  
  cloud:
    aws_sagemaker: false
    gcp_vertex_ai: false
    azure_ml: false

# Big data tools
big_data:
  spark:
    install_standalone: true
    pyspark_integration: true
  
  kafka:
    install: true
    create_topics: ["data-ingestion", "ml-predictions"]
  
  airflow:
    install: true
    sample_dags: true

# Data visualization
visualization:
  web_based:
    - "streamlit"
    - "dash"
    - "bokeh"
  
  desktop:
    - "tableau-public"
  
  programmatic:
    - "matplotlib"
    - "seaborn"
    - "plotly"
    - "altair"

# System optimizations for data science
system:
  memory:
    increase_limits: true
    vm_max_map_count: 262144  # For Elasticsearch
  
  python:
    environment_isolation: true
    conda_integration: false  # Using uv instead
  
  performance:
    blas_optimization: true
    numpy_threads: "auto"
    pandas_performance: true

# Security for data science
security:
  data_encryption: true
  notebook_security: true
  api_key_management: true
  secure_data_storage: true

# Research and documentation
research:
  reference_manager: "zotero"
  note_taking: "obsidian"
  documentation: "mkdocs"
  version_control_data: "dvc"

# Cloud integration (optional)
cloud_integration:
  aws:
    s3_integration: false
    sagemaker: false
  
  gcp:
    bigquery: false
    cloud_storage: false
  
  azure:
    blob_storage: false
    cognitive_services: false

# Hardware-specific optimizations
hardware_optimizations:
  apple_silicon:
    tensorflow_metal: true
    pytorch_mps: true
    native_scipy: true
  
  memory_intensive:
    swap_configuration: "conservative"
    background_processes: "minimal"
  
  gpu_acceleration:
    enable_if_available: true
    fallback_to_cpu: true

# Sample project templates
project_templates:
  - name: "ML Classification"
    description: "Binary/multiclass classification pipeline"
    structure: ["data/", "notebooks/", "src/", "models/", "reports/"]
  
  - name: "Time Series Analysis"
    description: "Time series forecasting project"
    structure: ["data/raw/", "data/processed/", "notebooks/", "models/", "forecasts/"]
  
  - name: "NLP Project"
    description: "Natural language processing pipeline"
    structure: ["data/text/", "models/", "preprocessing/", "evaluation/"]

# Verification checks
verification:
  python_packages:
    - "numpy"
    - "pandas"
    - "sklearn"
    - "jupyter"
  
  r_packages:
    - "tidyverse"
    - "ggplot2"
  
  services:
    - "postgresql@15"
    - "redis"
    - "mongodb-community"
  
  commands:
    - "python3 -c 'import numpy, pandas, sklearn'"
    - "R --version"
    - "julia --version"
    - "jupyter --version"

# Post-installation tasks
post_install:
  - "Set up Jupyter Lab environment"
  - "Configure R environment"
  - "Install Julia packages"
  - "Create sample data science project structure"
  - "Set up Git LFS for large data files"
  - "Configure database connections"