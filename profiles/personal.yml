# Personal Profile Configuration
# Basic productivity setup for personal use without heavy development tools

name: "Personal Productivity"
description: "Essential productivity tools and applications for personal use"
version: "1.0.0"

# Modules to execute for this profile
modules:
  required:
    - "01-system-detection"
    - "02-xcode-tools"       # Still needed for basic dev tools
    - "03-homebrew-setup"
    - "04-system-setup"
    - "05-macos-defaults"
  optional:
    - "06-applications"
    - "09-post-setup"      # Skip heavy dev environment and security hardening

# Homebrew configuration
homebrew:
  brewfiles:
    - "Brewfile"                    # Base essentials only
  
  additional_taps: []               # Minimal taps
  
  services_to_start: []             # No background services

# Application categories for personal use
applications:
  productivity:
    - "1password"
    - "alfred"
    - "rectangle"
    - "appcleaner"
  
  communication:
    - "zoom"
    - "slack"
    - "discord"
    - "whatsapp"
  
  media:
    - "vlc"
    - "spotify"
    - "handbrake"
    - "imageoptim"
  
  utilities:
    - "the-unarchiver"
    - "keka"
    - "coconutbattery"
    - "disk-utility"
  
  web_browsers:
    - "google-chrome"
    - "firefox"
    - "safari"  # System default
  
  cloud_storage:
    - "dropbox"
    - "google-drive"
    - "onedrive"

# Basic development tools (minimal)
development:
  basic_tools:
    - "git"               # For personal projects
    - "visual-studio-code" # Lightweight editor
  
  languages:
    python:
      install: false      # Not needed for personal use
    node:
      install: false
    
  git:
    setup_personal_identity: true
    default_branch: "main"

# System configuration for personal use
system:
  macos_defaults:
    dock_size: 48         # Slightly larger for easier use
    dock_autohide: true
    dock_magnification: true
    finder_show_extensions: true
    disable_auto_correct: false  # Keep autocorrect for personal typing
    faster_key_repeat: false     # Standard speed
  
  performance:
    visual_effects: true          # Keep nice animations
    transparency: true
    reduce_motion: false

# Security (basic level)
security:
  filevault: true               # Essential data protection
  firewall: true               # Basic network protection
  touch_id: true               # Convenience security
  ssh_keys: false              # Not needed for personal use
  automatic_updates: true      # Keep system updated

# Backup and sync
backup:
  time_machine: true
  icloud_sync: true
  photo_library_optimization: true
  documents_sync: true

# Entertainment and media
entertainment:
  music_library_optimization: true
  video_streaming_optimization: true
  gaming_support: false         # Can be enabled later if needed

# Productivity workflows
productivity:
  alfred_workflows: true
  text_expansion: false         # Can add later if needed
  automation: false             # Keep simple
  
  # App Store productivity apps
  app_store_apps:
    - "Amphetamine"             # Keep Mac awake
    - "Hidden Bar"              # Menu bar organization
    - "Pages"                   # Document creation
    - "Numbers"                 # Spreadsheets
    - "Keynote"                 # Presentations

# Privacy settings
privacy:
  location_services: selective
  siri_suggestions: true
  analytics_sharing: false
  ad_tracking: false
  handoff: true
  universal_clipboard: true

# Hardware optimizations
hardware_optimizations:
  battery_life: true            # Optimize for battery (if laptop)
  thermal_management: balanced
  performance_mode: balanced
  
  apple_silicon:
    use_native_apps: true
    avoid_rosetta: true

# Cloud services integration
cloud_services:
  icloud:
    documents: true
    photos: true
    keychain: true
    find_my: true
  
  google:
    drive: optional
    photos: optional
  
  dropbox:
    sync: optional

# Maintenance (automated and simple)
maintenance:
  automatic_updates: true
  cleanup_frequency: "monthly"
  restart_schedule: "weekly"
  storage_optimization: true

# Optional features (user prompted)
optional_features:
  - name: "Creative Apps"
    description: "Photo and video editing tools"
    apps: ["adobe-creative-cloud", "final-cut-pro"]
    default: false
  
  - name: "Gaming"
    description: "Gaming platforms and tools"
    apps: ["steam", "epic-games"]
    default: false
  
  - name: "Development"
    description: "Basic coding tools"
    apps: ["visual-studio-code", "github-desktop"]
    default: false

# Verification checks (minimal)
verification:
  essential_apps:
    - "1Password 7 - Password Manager"
    - "Rectangle"
    - "Alfred"
  
  system_settings:
    - "FileVault enabled"
    - "Firewall enabled"
    - "Time Machine configured"
  
  basic_functionality:
    - "Internet connectivity"
    - "App Store access"
    - "System updates available"

# Post-installation tasks
post_install:
  - "Set up iCloud account"
  - "Configure Time Machine backup"
  - "Install essential App Store apps"
  - "Set up personal email accounts"
  - "Configure privacy settings"
  - "Organize dock and menu bar"