# Mac Mini Configuration
# Hardware-specific settings for Mac Mini M4 16GB
# Optimized for compact server operation and efficient performance

hardware:
  model: "Mac Mini"
  chip_type: "apple_silicon"
  chip_name: "M4"
  memory_gb: 16
  type: "mini"
  performance_tier: "medium"
  always_on: true

system:
  hostname: "mac-mini"
  computer_name: "Mac Mini"
  local_hostname: "mac-mini"
  
  # Power management - optimized for compact server operation
  power:
    sleep_display: 10      # Display sleep after 10 minutes
    sleep_system: 0        # Never sleep system (always-on)
    sleep_disk: 0          # Never sleep disks
    power_nap: true        # Enable Power Nap
    wake_on_network: true  # Enable wake on network (limited Apple Silicon support)
    auto_restart: false    # Disable auto restart for stability
    hibernate_mode: 0      # Disable hibernation
    standby_mode: 0        # Disable standby mode
    wake_on_ac: true       # Enable wake on AC power attach
    tcp_keep_alive: true   # Enable TCP keep alive
    
  # Thermal management
  thermal_pressure_handling: "balanced"
  
  # Power schedule
  power_schedule:
    enabled: true
    maintenance_wake_time: "02:00"  # Daily wake at 2:00 AM

network:
  hostname: "mac-mini"
  bonjour_name: "Mac-Mini"
  enable_bonjour: true
  network_discovery: true
  disable_wifi: true
  enable_ethernet: true
  enable_thunderbolt_networking: true
  
  # Static IP configuration
  use_static_ip: true
  ip_address: "192.168.1.101"
  subnet_mask: "255.255.255.0"
  gateway: "192.168.1.1"
  
  # DNS configuration
  use_custom_dns: true
  primary_dns: "1.1.1.1"
  secondary_dns: "1.0.0.1"
  
  # DHCP configuration
  enable_dhcp_server: false

sharing:
  # File sharing services
  enable_afp: false
  enable_smb: true
  enable_ssh: true
  enable_remote_login: true
  
  # Network services
  enable_bonjour: true
  enable_service_discovery: true
  enable_time_machine_server: true
  
  # Screen sharing
  enable_screen_sharing: true
  enable_remote_management: true
  
  # Shared folder
  create_shared_folder: true
  shared_folder_name: "Mini-Server"
  shared_folder_path: "/Users/Shared/Mini-Server"

display:
  resolution: "auto"
  scaling: "default"
  
audio:
  output_device: "auto"
  disable_sound_effects: true
  
dock:
  position: "bottom"
  size: 36
  autohide: true
  show_recents: false
  
notifications:
  enable_notifications: false
  banner_style: "none"
  
screensaver:
  enable_screensaver: false
  timeout: 0
  
apple_intelligence:
  enable_apple_intelligence: false
  
siri:
  enable_siri: false
  enable_listen_for_hey_siri: false
  
wallpaper:
  type: "solid_color"
  color: "#000000"

performance:
  background_app_refresh: "limited"
  visual_effects: "reduced"
  transparency: false
  motion: "reduced"
  
  # Storage optimization
  spotlight_indexing: "selective"
  time_machine_local_snapshots: false

development:
  install_xcode: false
  install_docker: true
  install_homebrew_services: true
  enable_virtualization: true
  
  # Container optimization - conservative for 16GB
  docker_memory_limit: "8g"
  docker_cpu_limit: 4

security:
  firewall_enabled: true
  stealth_mode: true
  file_vault: true
  secure_boot: "full"
  
  # SSH hardening
  ssh_key_type: "ed25519"
  ssh_disable_password_auth: false
  ssh_max_auth_tries: 3
  
  # User accounts
  create_admin_user: false
  disable_guest_user: true

backup:
  time_machine_enabled: true
  time_machine_frequency: "daily"
  exclude_large_files: true

applications:
  productivity_suite: "minimal"
  development_tools: "basic"
  server_tools: true
  media_tools: "minimal"

maintenance:
  auto_update_homebrew: true
  auto_cleanup_logs: true
  auto_restart_schedule: "never"  # Always-on machine
  disk_cleanup_frequency: "weekly"