# MacBook Pro Configuration
# Hardware-specific settings for MacBook Pro M1 Pro 32GB
# Optimized for mobile use, battery life, and portable productivity

hardware:
  model: "MacBook Pro"
  chip_type: "apple_silicon"
  chip_name: "M1 Pro"
  memory_gb: 32
  type: "laptop"
  performance_tier: "high"
  always_on: false

system:
  hostname: "macbook-pro"
  computer_name: "MacBook Pro"
  local_hostname: "macbook-pro"

  # Power management - optimized for battery life
  power:
    sleep_display: 2 # Display sleep after 2 minutes on battery
    sleep_system: 5 # System sleep after 5 minutes on battery
    sleep_disk: 10 # Disk sleep after 10 minutes
    power_nap: true # Enable Power Nap
    wake_on_network: false # Disable for battery preservation
    auto_restart: false # Disable auto restart
    hibernate_mode: 3 # Enable hibernation for battery preservation
    standby_mode: 1 # Enable standby mode
    wake_on_ac: true # Enable wake on AC power attach
    tcp_keep_alive: false # Disable for battery preservation

  # Thermal management
  thermal_pressure_handling: "balanced"

  # Power schedule
  power_schedule:
    enabled: false # Disable for mobile device

network:
  hostname: "macbook-pro"
  bonjour_name: "MacBook-Pro"
  enable_bonjour: true
  network_discovery: true
  disable_wifi: false
  enable_ethernet: true
  enable_thunderbolt_networking: true

  # DHCP configuration (mobile device)
  use_static_ip: false

  # DNS configuration
  use_custom_dns: true
  primary_dns: "1.1.1.1"
  secondary_dns: "1.0.0.1"

  # DHCP configuration
  enable_dhcp_server: false

sharing:
  # File sharing services - limited for mobile
  enable_afp: false
  enable_smb: false
  enable_ssh: true
  enable_remote_login: true

  # Network services
  enable_bonjour: true
  enable_service_discovery: true
  enable_time_machine_server: false

  # Screen sharing
  enable_screen_sharing: true
  enable_remote_management: false

  # Shared folder
  create_shared_folder: false

display:
  resolution: "auto"
  scaling: "default"

audio:
  output_device: "auto"
  disable_sound_effects: false

dock:
  position: "bottom"
  size: 48
  autohide: true
  show_recents: false

notifications:
  enable_notifications: true
  banner_style: "banners"

screensaver:
  enable_screensaver: true
  timeout: 300 # 5 minutes

apple_intelligence:
  enable_apple_intelligence: false

siri:
  enable_siri: false
  enable_listen_for_hey_siri: false

wallpaper:
  type: "image"
  path: "configs/assets/pexels-mikhail-nilov-6942967.jpg"

performance:
  background_app_refresh: "smart"
  visual_effects: "full"
  transparency: true
  motion: "full"

  # Storage optimization
  spotlight_indexing: "full"
  time_machine_local_snapshots: true

development:
  install_xcode: true
  install_docker: true
  install_homebrew_services: true
  enable_virtualization: true

  # Container optimization - conservative for battery
  docker_memory_limit: "8g"
  docker_cpu_limit: 4

security:
  firewall_enabled: true
  stealth_mode: true
  file_vault: true
  secure_boot: "full"

  # SSH hardening
  ssh_key_type: "ed25519"
  ssh_disable_password_auth: false
  ssh_max_auth_tries: 3

  # User accounts
  create_admin_user: false
  disable_guest_user: true

backup:
  time_machine_enabled: true
  time_machine_frequency: "hourly"
  exclude_large_files: true

applications:
  productivity_suite: "full"
  development_tools: "full"
  server_tools: false
  media_tools: "full"

maintenance:
  auto_update_homebrew: true
  auto_cleanup_logs: true
  auto_restart_schedule: "weekly"
  disk_cleanup_frequency: "weekly"
